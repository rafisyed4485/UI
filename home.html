<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dream IT Solutions</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* LOGO */
.logo {
  font-size: 1.8rem;
  font-weight: bold;
}

/* NAV BUTTONS */
.links {
  display: flex;
  gap: 15px;
}

.links a {
  padding: 8px 18px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.links a:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 20px rgba(255,75,43,0.7);
}

/* SHINE EFFECT */
.links a::before {
  content: "";
  position: absolute;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
}

.links a:hover::before {
  left: 100%;
  transition: 0.5s;
}

/* WELCOME BADGE */
.welcome-box {
  margin-top: 10px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 0 15px rgba(0,198,255,0.6);
  display: inline-block;
}

/* SLIDESHOW */
.slideshow {
  width: 80%;
  height: 450px;
  margin: 30px auto;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.slideshow img {
  width: 100%;
  height: 100%;
  display: none;
  position: absolute;
}

.slideshow img.active {
  display: block;
}

/* PRODUCTS */
.products {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  justify-content: center;
  padding: 40px;
}

/* PREMIUM CARD */
.product {
  width: 200px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-align: center;
  transition: 0.4s;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.product:hover {
  transform: rotateY(10deg) scale(1.05);
  box-shadow: 0 0 30px rgba(0,198,255,0.7);
}

.product button {
  margin-top: 10px;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  cursor: pointer;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    Dream<span style="color:#00bcd4;">IT</span><span style="color:#ff1744;">Solutions</span>
  </div>

  <div>
    <div class="links">
      <a href="#" onclick="renderProducts(productList)">🛒 Products</a>
      <a href="#" onclick="showCart()">🧺 Cart (<span id="cartCount">0</span>)</a>
      <a href="#">🎯 Quiz</a>
      <a href="#">⚙️ Controls</a>
      <a href="#" onclick="signOut()">🚪 Sign Out</a>
    </div>

    <div class="welcome-box">
      ✨ Welcome, <span id="userDisplay">User</span>
    </div>
  </div>
</header>

<div class="slideshow" id="slideshow">
  <img src="https://wallpapercat.com/w/full/9/3/2/5817846-3840x2160-desktop-hd-motivational-background-image.jpg">
  <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
</div>

<div class="products" id="productContainer"></div>

<script>
const user = localStorage.getItem("loggedInUser") || "drea@gmail.com";
document.getElementById("userDisplay").innerText = user;

/* PRODUCTS */
const productList = ["iPhone 14","Galaxy S23","Pixel 7","OnePlus 11"];

function renderProducts(list){
  let html="";
  list.forEach(p=>{
    html += `
    <div class="product">
      <h3>${p}</h3>
      <button onclick="addToCart('${p}')">Add to Cart</button>
    </div>`;
  });
  document.getElementById("productContainer").innerHTML = html;
}

/* CART */
function addToCart(p){
  let cart = JSON.parse(localStorage.getItem("cart"))||[];
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function showCart(){
  let cart = JSON.parse(localStorage.getItem("cart"))||[];
  renderProducts(cart);
}

function updateCart(){
  let cart = JSON.parse(localStorage.getItem("cart"))||[];
  document.getElementById("cartCount").innerText = cart.length;
}

updateCart();

/* SLIDESHOW */
let slides = document.querySelectorAll("#slideshow img");
let i=0;
slides[i].classList.add("active");

setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},3000);

/* SIGN OUT */
function signOut(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
