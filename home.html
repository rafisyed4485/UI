<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dream IT Solutions</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fff;
}

/* HEADER */
header {
  background-color: #ffffff;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid #ccc;
}

.logo {
  font-size: 1.8rem;
  font-weight: bold;
}

/* NAV */
.nav-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.nav-actions .links {
  display: flex;
  gap: 15px;
}

.nav-actions .links a {
  padding: 8px 16px;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.9rem;
  transition: 0.3s;
}

.nav-actions .links a:hover {
  transform: translateY(-2px);
}

/* COLORS */
.nav-actions .links a:nth-child(1) { background: #0072ff; }
.nav-actions .links a:nth-child(2) { background: #ff7e5f; }
.nav-actions .links a:nth-child(3) { background: #43e97b; }
.nav-actions .links a:nth-child(4) { background: #fa709a; }
.nav-actions .links a:nth-child(5) { background: #ff416c; }

/* WELCOME BADGE */
.welcome span {
  padding: 5px 12px;
  border-radius: 20px;
  background: #0072ff;
  color: white;
  font-size: 0.85rem;
}

/* SLIDESHOW */
.slideshow-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.slideshow {
  width: 80%;
  height: 820px;
  position: relative;
  overflow: hidden;
}

.slideshow img {
  width: 100%;
  height: 100%;
  display: none;
  position: absolute;
}

.slideshow img.active {
  display: block;
}

/* QUIZ LINKS */
.quiz-links {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

/* PRODUCTS */
.products {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  padding: 2rem;
}

.product {
  background: white;
  padding: 1rem;
  border-radius: 8px;
  width: 160px;
  text-align: center;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    Dream<span style="color:#00bcd4;">IT</span><span style="color:#ff1744;">Solutions</span>
  </div>

  <div class="nav-actions">
    <div class="links">
      <a href="#" onclick="renderProducts(productList)">All Products</a>
      <a href="#" onclick="showCartProducts()">Cart (<span id="cartCount">0</span>)</a>
      <a href="#" onclick="goToQuiz1()">Quiz</a>
      <a href="controls.html">Controls</a>
      <a href="#" onclick="signOut()">Sign Out</a>
    </div>

    <div class="welcome">
      Welcome, <span id="userDisplay">User</span>
    </div>
  </div>
</header>

<!-- SLIDESHOW + QUIZ -->
<div class="slideshow-wrapper" id="slideshowSection">

  <div class="slideshow" id="slideshow">
    <img src="https://i.etsystatic.com/17780762/r/il/b94ac6/2657518102/il_1140xN.jpg" />
    <img src="https://wallpapercat.com/w/full/9/3/2/5817846.jpg" />
    <img src="https://blog.attendancebot.com/wp-content/uploads/2021/05/Motivational-Quote-for-Work-by-Gandhi.jpg" />
  </div>

  <div class="quiz-links">
    <a href="#" onclick="showQuiz1()">Quiz 1</a>
    <a href="#" onclick="showQuiz2()">Quiz 2</a>
    <a href="#" onclick="showQuiz3()">Quiz 3</a>
  </div>

  <div id="quizForm" style="display:none;">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfT6/viewform?embedded=true" width="100%" height="600"></iframe>
  </div>

  <div id="quizForm2" style="display:none;">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd4/viewform?embedded=true" width="100%" height="600"></iframe>
  </div>

  <div id="quizForm3" style="display:none;">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfda/viewform?embedded=true" width="100%" height="600"></iframe>
  </div>

</div>

<div class="products" id="productContainer"></div>

<script>
const userId = localStorage.getItem('loggedInUser') || "drea@gmail.com";
document.getElementById('userDisplay').innerText = userId;

/* SIGN OUT */
function signOut() {
  localStorage.clear();
  location.reload();
}

/* QUIZ */
function goToQuiz1() {
  document.querySelector('.quiz-links').scrollIntoView();
}

function showQuiz1() {
  hideAllQuizForms();
  document.getElementById('quizForm').style.display = 'block';
}

function showQuiz2() {
  hideAllQuizForms();
  document.getElementById('quizForm2').style.display = 'block';
}

function showQuiz3() {
  hideAllQuizForms();
  document.getElementById('quizForm3').style.display = 'block';
}

function hideAllQuizForms() {
  document.getElementById('quizForm').style.display = 'none';
  document.getElementById('quizForm2').style.display = 'none';
  document.getElementById('quizForm3').style.display = 'none';
}

/* PRODUCTS */
const productList = ["iPhone 14","Galaxy S23","Pixel 7"];

function renderProducts(list){
  document.getElementById('slideshowSection').style.display = 'none';
  let html="";
  list.forEach(p=>{
    html += `<div class="product"><p>${p}</p>
    <button onclick="addToCart('${p}')">Add</button></div>`;
  });
  document.getElementById("productContainer").innerHTML = html;
}

/* CART */
function addToCart(p){
  let cart = JSON.parse(localStorage.getItem("cartItems"))||[];
  cart.push(p);
  localStorage.setItem("cartItems", JSON.stringify(cart));
  updateCart();
}

function showCartProducts(){
  let cart = JSON.parse(localStorage.getItem("cartItems"))||[];
  renderProducts(cart);
}

function updateCart(){
  let cart = JSON.parse(localStorage.getItem("cartItems"))||[];
  document.getElementById("cartCount").innerText = cart.length;
}

updateCart();

/* SLIDESHOW */
let slides = document.querySelectorAll("#slideshow img");
let i=0;
slides[i].classList.add("active");

setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},3000);

</script>

</body>
</html>
