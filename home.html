<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dream IT Solutions</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00bcd4 0%, #ff1744 50%, #1877f2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .nav-actions .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-actions a {
      color: #1e40af;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 20px;
    }

    .slideshow-wrapper {
      background-color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 0;
      margin: 2rem;
      border-radius: 24px;
    }

    .quiz-links-top {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .quiz-links-top a {
      padding: 12px 22px;
      border-radius: 50px;
      text-decoration: none;
      background: rgba(255,255,255,0.9);
      color: #1e40af;
    }

    /* EXISTING FINAL QUIZ */
    .quiz-links-top a.final-quiz {
      background: #ff1744;
      color: #fff !important;
      font-weight: 700;
    }

    /* ✅ NEW ENROLL BUTTON */
    .quiz-links-top a.enroll-btn {
      background: linear-gradient(135deg, #00c853 0%, #2e7d32 100%);
      color: #fff !important;
      font-weight: 700;
    }

    .slideshow {
      width: 90%;
      max-width: 1800px;
      height: 820px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
    }

    .slideshow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
    }

    .slideshow img.active {
      display: block;
    }

    #quizForm, #quizForm2, #quizForm3, #quizForm4, #quizForm5, #finalQuizForm {
      padding: 2rem;
      margin: 2rem;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Dream IT Solutions</div>

  <div class="nav-actions">
    <div class="links">
      <a href="#" onclick="renderProducts(productList)">All Products</a>
      <a href="#" onclick="showCartProducts()">Cart (<span id="cartCount">0</span>)</a>
      <a href="#" onclick="goToQuiz1()">Quiz</a>
      <a href="controls.html">Controls</a>
      <a href="#" onclick="signOut()">Sign Out</a>
    </div>
    <div class="welcome">
      Welcome, <span id="userDisplay">User</span>!
    </div>
  </div>
</header>

<div class="slideshow-wrapper" id="slideshowSection">

  <!-- QUIZ LINKS -->
  <div class="quiz-links-top">
    <a href="#" onclick="showQuiz1()">Quiz 1</a>
    <a href="#" onclick="showQuiz2()">Quiz 2</a>
    <a href="#" onclick="showQuiz3()">Quiz 3</a>
    <a href="#" onclick="showQuiz4()">Quiz 4</a>
    <a href="#" onclick="showQuiz5()">Quiz 5</a>

    <!-- EXISTING -->
    <a href="#" onclick="showFinalQuiz()" class="final-quiz">Final Quiz</a>

    <!-- ✅ NEW -->
    <a href="enrollment.html" class="enroll-btn">
      Click here to enroll
    </a>
  </div>

  <!-- SLIDESHOW (UNCHANGED) -->
  <div class="slideshow" id="slideshow">
    <img src="https://i.etsystatic.com/17780762/r/il/b94ac6/2657518102/il_1140xN.2657518102_72iw.jpg" />
    <img src="https://wallpapercat.com/w/middle-retina/9/3/2/5817846-3840x2160-desktop-hd-motivational-background-image.jpg" />
    <img src="https://blog.attendancebot.com/wp-content/uploads/2021/05/Motivational-Quote-for-Work-by-Gandhi-1024x576.jpg" />
  </div>

  <!-- QUIZ FORMS -->
  <div id="quizForm"></div>
  <div id="quizForm2"></div>
  <div id="quizForm3"></div>
  <div id="quizForm4"></div>
  <div id="quizForm5"></div>
  <div id="finalQuizForm"></div>

</div>

<script>
const userId = localStorage.getItem('loggedInUser');
if (userId) document.getElementById('userDisplay').innerText = userId;

function signOut() {
  localStorage.clear();
  location.href = "index.html";
}

function goToQuiz1() {
  document.querySelector('.quiz-links-top').scrollIntoView({ behavior: 'smooth' });
}

function hideAllQuizForms() {
  document.querySelectorAll('#quizForm,#quizForm2,#quizForm3,#quizForm4,#quizForm5,#finalQuizForm')
    .forEach(el => el.style.display = 'none');
}

function showQuiz1(){ hideAllQuizForms(); quizForm.style.display='block'; }
function showQuiz2(){ hideAllQuizForms(); quizForm2.style.display='block'; }
function showQuiz3(){ hideAllQuizForms(); quizForm3.style.display='block'; }
function showQuiz4(){ hideAllQuizForms(); quizForm4.style.display='block'; }
function showQuiz5(){ hideAllQuizForms(); quizForm5.style.display='block'; }
function showFinalQuiz(){ hideAllQuizForms(); finalQuizForm.style.display='block'; }

/* SLIDESHOW (UNCHANGED) */
const slides = document.querySelectorAll('#slideshow img');
let currentSlide = 0;
slides[currentSlide].classList.add('active');

setInterval(() => {
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide + 1) % slides.length;
  slides[currentSlide].classList.add('active');
}, 3000);
</script>

</body>
</html>
