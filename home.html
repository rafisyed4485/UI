<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dream IT Solutions</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00bcd4 0%, #ff1744 50%, #1877f2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo a {
      text-decoration: none;
    }
    .nav-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .nav-actions .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .nav-actions a {
      color: #1e40af;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .nav-actions a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s;
    }
    .nav-actions a:hover::before {
      left: 100%;
    }
    .nav-actions a:hover {
      color: #ffffff;
      background: linear-gradient(135deg, #00bcd4 0%, #ff1744 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 188, 212, 0.4);
      border-color: rgba(255, 23, 68, 0.3);
    }
    .nav-actions a:active {
      transform: translateY(0);
    }
    .welcome {
      font-size: 0.9rem;
      color: #6b7280;
      font-weight: 600;
      margin-top: 4px;
      background: linear-gradient(135deg, #00bcd4, #ff1744);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #userDisplay {
      font-weight: 700;
      color: #1f2937;
      background: linear-gradient(135deg, #00bcd4, #ff1744);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .slideshow-wrapper {
      background-color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 0;
      margin: 1.5rem;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .slideshow {
      width: 90%;
      max-width: 1800px;
      /* Reduced height from 820px to 450px - perfect fit! */
      height: 450px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      transition: transform 0.3s ease;
      margin-bottom: 1.5rem;
    }
    .slideshow:hover {
      transform: translateY(-5px);
    }
    .slideshow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.5s ease;
    }
    .slideshow img.active {
      display: block;
      transform: scale(1.02);
    }
    .quiz-links {
      display: flex;
      gap: 20px;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 2rem;
      width: 90%;
    }
    .quiz-links a {
      font-size: 1.05rem;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      color: #1e40af;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .quiz-links a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: left 0.6s;
    }
    .quiz-links a:hover::before {
      left: 100%;
    }
    .quiz-links a:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      color: #ffffff;
    }

    /* Final Quiz enhanced styling */
    .quiz-links a.final-quiz {
      background: linear-gradient(135deg, #ff1744 0%, #d50000 100%);
      color: #ffffff !important;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(255, 23, 68, 0.4);
      border-color: rgba(255, 23, 68, 0.6);
      animation: pulse-glow 1.5s infinite;
    }
    .quiz-links a.final-quiz:hover {
      background: linear-gradient(135deg, #d50000 0%, #ff1744 100%);
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 20px 40px rgba(255, 23, 68, 0.6);
      text-decoration: none;
    }
    @keyframes pulse-glow {
      0% { 
        box-shadow: 0 0 20px rgba(255, 23, 68, 0.6), 0 0 40px rgba(255, 23, 68, 0.3);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 0 30px rgba(255, 23, 68, 0.9), 0 0 60px rgba(255, 23, 68, 0.5);
        transform: scale(1.02);
      }
      100% { 
        box-shadow: 0 0 20px rgba(255, 23, 68, 0.6), 0 0 40px rgba(255, 23, 68, 0.3);
        transform: scale(1);
      }
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .product {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      width: 180px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .product:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    }
    .product img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }
    .product button {
      margin-top: 12px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #00bcd4 0%, #ff1744 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 188, 212, 0.4);
    }
    .product button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 188, 212, 0.6);
    }
    #quizForm, #quizForm2, #quizForm3, #quizForm4, #quizForm5, #finalQuizForm {
      padding: 2rem;
      background: rgba(249,249,249,0.95);
      margin: 2rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      display: none;
      backdrop-filter: blur(10px);
    }
    @media (max-width: 768px) {
      .slideshow {
        height: 350px;
      }
      .nav-actions .links {
        gap: 4px;
      }
      .nav-actions a {
        padding: 6px 12px;
        font-size: 0.9rem;
      }
      .quiz-links {
        gap: 12px;
        flex-direction: column;
        align-items: center;
      }
      .quiz-links a {
        padding: 10px 20px;
        font-size: 1rem;
        width: 200px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <a href="home.html" style="text-decoration: none; color: inherit;">
        Dream<span style="color:#00bcd4;">IT</span><span style="color:#ff1744;">Solutions</span>
      </a>
    </div>
    <div class="nav-actions">
      <div class="links">
        <a href="#" onclick="renderProducts(productList)">All Products</a>
        <a href="#" onclick="showCartProducts()">Cart (<span id="cartCount">0</span>)</a>
        <a href="#" onclick="goToQuiz1()">Quiz</a>
        <a href="controls.html">Controls</a>
        <a href="#" onclick="signOut()">Sign Out</a>
      </div>
      <div class="welcome">
        Welcome, <span id="userDisplay">User</span>!
      </div>
    </div>
  </header>

  <div class="slideshow-wrapper" id="slideshowSection">
    <div class="slideshow" id="slideshow">
      <img src="https://i.etsystatic.com/17780762/r/il/b94ac6/2657518102/il_1140xN.2657518102_72iw.jpg" />
      <img src="https://wallpapercat.com/w/middle-retina/9/3/2/5817846-3840x2160-desktop-hd-motivational-background-image.jpg" />
      <img src="https://blog.attendancebot.com/wp-content/uploads/2021/05/Motivational-Quote-for-Work-by-Gandhi-1024x576.jpg" />
    </div>
    <div class="quiz-links">
      <a href="#" onclick="showQuiz1()">Quiz 1</a>
      <a href="#" onclick="showQuiz2()">Quiz 2</a>
      <a href="#" onclick="showQuiz3()">Quiz 3</a>
      <a href="#" onclick="showQuiz4()">Quiz 4</a>
      <a href="#" onclick="showQuiz5()">Quiz 5</a>
      <a href="#" onclick="showFinalQuiz()" class="final-quiz">Final Quiz</a>
    </div>

    <div id="quizForm">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfT6W9I7GS6xnPujZgnpJd0j8YtJLG1xdQ-Y6ShO1YZ7-_5Cw/viewform?embedded=true" width="1200" height="1822" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <div id="quizForm2">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd4sleUPDexnAR8eKNnbgP3lUOwINe3S-LTeTiwlfbG73cdkQ/viewform?embedded=true" width="1800" height="377" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <div id="quizForm3">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfda11TEoQetlOEbwbuBGS3o7f2cc5gxFv8hMnGPLrBr5AcMQ/viewform?embedded=true" width="640" height="6878" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <div id="quizForm4">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSei4VIoHr-Pg4nKsXmzLGLLYI7N3nfvnWRuPfSCUUqNtKgArQ/viewform?embedded=true" width="640" height="5419" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <div id="quizForm5">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeolKgcwtd12xF2Hbg2XU9GoRYVymirO756aPPjTGmb-DKMdg/viewform?embedded=true" width="640" height="6892" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <div id="finalQuizForm">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdrum0IJSvGJ57Mlfkpsb56DnFq5c4zw77UmKOokB2CP7D6Og/viewform?embedded=true" width="640" height="27876" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>
  </div>

  <div class="products" id="productContainer"></div>

  <script>
    const userId = localStorage.getItem('loggedInUser');
    if (!userId) {
      window.location.href = "index.html";
    } else {
      document.getElementById('userDisplay').innerText = userId;
    }

    function signOut() {
      localStorage.removeItem('loggedInUser');
      localStorage.removeItem('cartItems');
      window.location.href = "index.html";
    }

    function goToQuiz1() {
      hideAllQuizForms();
      document.querySelector('.quiz-links').scrollIntoView({ behavior: 'smooth' });
    }

    function showQuiz1() {
      document.getElementById('productContainer').innerHTML = '';
      hideAllQuizForms();
      document.getElementById('quizForm').style.display = 'block';
      document.getElementById('quizForm').scrollIntoView({ behavior: 'smooth' });
    }

    function showQuiz2() {
      document.getElementById('productContainer').innerHTML = '';
      hideAllQuizForms();
      document.getElementById('quizForm2').style.display = 'block';
      document.getElementById('quizForm2').scrollIntoView({ behavior: 'smooth' });
    }

    function showQuiz3() {
      document.getElementById('productContainer').innerHTML = '';
      hideAllQuizForms();
      document.getElementById('quizForm3').style.display = 'block';
      document.getElementById('quizForm3').scrollIntoView({ behavior: 'smooth' });
    }

    function showQuiz4() {
      document.getElementById('productContainer').innerHTML = '';
      hideAllQuizForms();
      document.getElementById('quizForm4').style.display = 'block';
      document.getElementById('quizForm4').scrollIntoView({ behavior: 'smooth' });
    }

    function showQuiz5() {
      document.getElementById('productContainer').innerHTML = '';
      hideAllQuizForms();
      document.getElementById('quizForm5').style.display = 'block';
      document.getElementById('quizForm5').scrollIntoView({ behavior: 'smooth' });
    }

    function showFinalQuiz() {
      document.getElementById('productContainer').innerHTML = '';
      hideAllQuizForms();
      document.getElementById('finalQuizForm').style.display = 'block';
      document.getElementById('finalQuizForm').scrollIntoView({ behavior: 'smooth' });
    }

    function hideAllQuizForms() {
      document.getElementById('quizForm').style.display = 'none';
      document.getElementById('quizForm2').style.display = 'none';
      document.getElementById('quizForm3').style.display = 'none';
      document.getElementById('quizForm4').style.display = 'none';
      document.getElementById('quizForm5').style.display = 'none';
      document.getElementById('finalQuizForm').style.display = 'none';
    }

    const productList = [
      "iPhone 14", "Galaxy S23", "Pixel 7", "OnePlus 11", "Xiaomi 13", "Motorola Edge", "Nokia XR20"
    ];

    const productImages = {
      "iPhone 14": "https://cdn-icons-png.flaticon.com/128/833/833472.png",
      "Galaxy S23": "https://cdn-icons-png.flaticon.com/128/833/833462.png",
      "Pixel 7": "https://cdn-icons-png.flaticon.com/128/1055/1055687.png",
      "OnePlus 11": "https://cdn-icons-png.flaticon.com/128/2920/2920676.png",
      "Xiaomi 13": "https://cdn-icons-png.flaticon.com/128/1055/1055672.png",
      "Motorola Edge": "https://cdn-icons-png.flaticon.com/128/906/906334.png",
      "Nokia XR20": "https://cdn-icons-png.flaticon.com/128/906/906343.png"
    };

    function renderProducts(products, isCart = false) {
      hideAllQuizForms();
      document.getElementById('slideshowSection').style.display = 'none';
      const container = document.getElementById('productContainer');
      container.innerHTML = "";
      products.forEach(name => {
        const price = (Math.floor(Math.random() * 500) + 300) + ".00";
        const img = productImages[name] || "https://via.placeholder.com/60";
        const button = isCart
          ? `<button onclick="removeFromCart('${name}')">Remove</button>`
          : `<button onclick="addToCart('${name}')">Add to Cart</button>`;
        const productHTML = `
          <div class="product">
            <img src="${img}" alt="${name}">
            <p><strong>${name}</strong></p>
            <p>$${price}</p>
            ${button}
          </div>
        `;
        container.insertAdjacentHTML('beforeend', productHTML);
      });
    }

    function addToCart(product) {
      let cart = JSON.parse(localStorage.getItem('cartItems')) || [];
      if (!cart.includes(product)) {
        cart.push(product);
        localStorage.setItem('cartItems', JSON.stringify(cart));
        updateCartCount();
        alert(`${product} added to cart!`);
      } else {
        alert(`${product} is already in cart.`);
      }
    }

    function removeFromCart(product) {
      let cart = JSON.parse(localStorage.getItem('cartItems')) || [];
      cart = cart.filter(item => item !== product);
      localStorage.setItem('cartItems', JSON.stringify(cart));
      updateCartCount();
      showCartProducts();
    }

    function showCartProducts() {
      hideAllQuizForms();
      document.getElementById('slideshowSection').style.display = 'none';
      const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
      const container = document.getElementById('productContainer');
      container.innerHTML = "";

      if (cart.length === 0) {
        alert("Your cart is empty.");
        updateCartCount();
        return;
      }

      renderProducts(cart, true);
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
      document.getElementById('cartCount').innerText = cart.length;
    }

    updateCartCount();

    const slides = document.querySelectorAll('#slideshow img');
    let currentSlide = 0;
    slides[currentSlide].classList.add('active');
    setInterval(() => {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }, 3000);
  </script>

</body>
</html>
