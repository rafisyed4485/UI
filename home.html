<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dream IT Solutions</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fff;
}

/* HEADER */
header {
  background-color: #ffffff;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid #ccc;
}

.logo {
  font-size: 1.8rem;
  font-weight: bold;
}

/* ================= NAV UPGRADE ================= */

.nav-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.nav-actions .links {
  display: flex;
  gap: 15px;
}

/* BUTTON STYLE */
.nav-actions .links a {
  position: relative;
  padding: 8px 16px;
  font-size: 0.9rem;
  text-decoration: none;
  color: #fff;
  border-radius: 8px;
  font-weight: 500;
  overflow: hidden;
  transition: 0.3s;
}

/* SHINE EFFECT */
.nav-actions .links a::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: 0.5s;
}

.nav-actions .links a:hover::before {
  left: 100%;
}

.nav-actions .links a:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* COLORS */
.nav-actions .links a:nth-child(1) { background: #0072ff; }
.nav-actions .links a:nth-child(2) { background: #ff7e5f; }
.nav-actions .links a:nth-child(3) { background: #43e97b; }
.nav-actions .links a:nth-child(4) { background: #fa709a; }
.nav-actions .links a:nth-child(5) {
  background: #ff416c;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 5px #ff416c; }
  50% { box-shadow: 0 0 15px #ff416c; }
  100% { box-shadow: 0 0 5px #ff416c; }
}

/* ================= WELCOME BADGE ================= */

.welcome {
  margin-top: 6px;
}

.welcome span {
  padding: 5px 12px;
  border-radius: 20px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: #fff;
  font-weight: 500;
  font-size: 0.85rem;
  box-shadow: 0 0 10px rgba(0,198,255,0.4);
}

/* KEEP YOUR ORIGINAL STYLES BELOW */
.slideshow-wrapper {
  background-color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
}

.slideshow {
  width: 80%;
  max-width: 1800px;
  height: 820px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

.slideshow img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  position: absolute;
}

.slideshow img.active {
  display: block;
}

.products {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  padding: 2rem;
}

.product {
  background: white;
  padding: 1rem;
  border-radius: 8px;
  width: 160px;
  text-align: center;
}

.product button {
  margin-top: 10px;
  padding: 6px 10px;
  background-color: #1877f2;
  color: white;
  border: none;
  border-radius: 4px;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    Dream<span style="color:#00bcd4;">IT</span><span style="color:#ff1744;">Solutions</span>
  </div>

  <div class="nav-actions">
    <div class="links">
      <a href="#" onclick="renderProducts(productList)">🛒 All Products</a>
      <a href="#" onclick="showCartProducts()">🧺 Cart (<span id="cartCount">0</span>)</a>
      <a href="#" onclick="goToQuiz1()">🎯 Quiz</a>
      <a href="controls.html">⚙️ Controls</a>
      <a href="#" onclick="signOut()">🚪 Sign Out</a>
    </div>

    <div class="welcome">
      Welcome, <span id="userDisplay">User</span>
    </div>
  </div>
</header>

<!-- KEEP EVERYTHING ELSE SAME (your slideshow, quiz, scripts etc.) -->

</body>
</html>
