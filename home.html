<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dream IT Solutions</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: white;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-actions a {
  margin: 0 10px;
  text-decoration: none;
  color: blue;
}

.slideshow-wrapper {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
}

.quiz-links-top {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.quiz-links-top a {
  padding: 10px 18px;
  border-radius: 30px;
  text-decoration: none;
  background: #eee;
  color: black;
  font-weight: 600;
}

/* Existing Final Quiz (RED) */
.final-quiz {
  background: red !important;
  color: white !important;
}

/* NEW Green Enroll Button */
.enroll-btn {
  background: green !important;
  color: white !important;
}

/* Slideshow */
.slideshow {
  width: 90%;
  height: 400px;
  margin: 20px auto;
  position: relative;
}

.slideshow img {
  width: 100%;
  height: 100%;
  display: none;
}

.slideshow img.active {
  display: block;
}

/* Quiz Forms */
#quizForm, #quizForm2, #quizForm3, #quizForm4, #quizForm5, #finalQuizForm {
  display: none;
  margin: 20px;
}

.products {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  width: 150px;
  text-align: center;
}

.product button {
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dream IT Solutions</div>

  <div class="nav-actions">
    <a href="#" onclick="renderProducts(productList)">All Products</a>
    <a href="#" onclick="showCartProducts()">Cart (<span id="cartCount">0</span>)</a>
    <a href="#" onclick="goToQuiz1()">Quiz</a>
    <a href="#">Controls</a>
    <a href="#" onclick="signOut()">Sign Out</a>
    <div>Welcome, <span id="userDisplay">User</span></div>
  </div>
</header>

<div class="slideshow-wrapper" id="slideshowSection">

  <!-- Quiz Buttons -->
  <div class="quiz-links-top">
    <a href="#" onclick="showQuiz1()">Quiz 1</a>
    <a href="#" onclick="showQuiz2()">Quiz 2</a>
    <a href="#" onclick="showQuiz3()">Quiz 3</a>
    <a href="#" onclick="showQuiz4()">Quiz 4</a>
    <a href="#" onclick="showQuiz5()">Quiz 5</a>

    <!-- Existing -->
    <a href="#" onclick="showFinalQuiz()" class="final-quiz">Final Quiz</a>

    <!-- NEW -->
    <a href="#" onclick="showFinalQuiz()" class="enroll-btn">
      Click here to enroll
    </a>
  </div>

  <!-- Slideshow -->
  <div class="slideshow" id="slideshow">
    <img src="https://via.placeholder.com/800x400?text=Slide+1" class="active">
    <img src="https://via.placeholder.com/800x400?text=Slide+2">
    <img src="https://via.placeholder.com/800x400?text=Slide+3">
  </div>

  <!-- Quiz Forms -->
  <div id="quizForm">Quiz 1 Content</div>
  <div id="quizForm2">Quiz 2 Content</div>
  <div id="quizForm3">Quiz 3 Content</div>
  <div id="quizForm4">Quiz 4 Content</div>
  <div id="quizForm5">Quiz 5 Content</div>

  <div id="finalQuizForm">
    <h2>Final Quiz (Same for Enroll Button)</h2>
  </div>

</div>

<div class="products" id="productContainer"></div>

<script>
// USER
const userId = localStorage.getItem('loggedInUser') || "Guest";
document.getElementById('userDisplay').innerText = userId;

// SIGN OUT
function signOut() {
  localStorage.clear();
  location.reload();
}

// QUIZ NAVIGATION
function hideAllQuizForms() {
  document.querySelectorAll('#quizForm, #quizForm2, #quizForm3, #quizForm4, #quizForm5, #finalQuizForm')
    .forEach(el => el.style.display = 'none');
}

function showQuiz1(){ hideAllQuizForms(); quizForm.style.display='block'; }
function showQuiz2(){ hideAllQuizForms(); quizForm2.style.display='block'; }
function showQuiz3(){ hideAllQuizForms(); quizForm3.style.display='block'; }
function showQuiz4(){ hideAllQuizForms(); quizForm4.style.display='block'; }
function showQuiz5(){ hideAllQuizForms(); quizForm5.style.display='block'; }

function showFinalQuiz(){
  hideAllQuizForms();
  finalQuizForm.style.display='block';
}

// PRODUCTS
const productList = ["iPhone","Samsung","Pixel"];

function renderProducts(products){
  hideAllQuizForms();
  const container = document.getElementById('productContainer');
  container.innerHTML = "";
  products.forEach(p=>{
    container.innerHTML += `
      <div class="product">
        <p>${p}</p>
        <button onclick="addToCart('${p}')">Add</button>
      </div>
    `;
  });
}

function addToCart(p){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.push(p);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function showCartProducts(){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  renderProducts(cart);
}

function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  document.getElementById('cartCount').innerText = cart.length;
}

updateCartCount();

// SLIDESHOW
let slides = document.querySelectorAll("#slideshow img");
let i = 0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i = (i+1)%slides.length;
  slides[i].classList.add("active");
},2000);
</script>

</body>
</html>
